[project]
# basic metadata
site_name = "~ajhalili2006"
site_url = "https://andreijiroh.dev"
docs_dir = "markdown"
site_dir = "public"
site_author = "Andrei Jiroh Halili"
copyright = "Copyright &copy; 2022-present - Andrei Jiroh Halili and contributors, licensed under the <a href=\"https://creativecommons.org/licenses/by-sa/4.0\">CC BY-SA 4.0</a> license."
use_directory_urls = true
# repo stuff
repo_url = "https://gitlab.com/andreijiroh-dev/website"
edit_uri = "edit/main/markdown"
repo_name = "source code"

# navbar
nav = [
  { "Profile README" = "index.md" },
  { "nowpage" = "now.md" },
  { "Digital Garden / Wiki" = "https://wiki.andreijiroh.dev" },
  { "Blog" = "https://blog.andreijiroh.dev" },
  { "All the links!" = "links.md" },
  { "Contact" = [
    "contact/index.md",
    "contact/code-reviews.md",
    "contact/donations.md",
    "contact/work.md",
    "contact/security.md",
    { "Anything else" = [
      "contact/else.md",
      { "Contact details" = "contact/details.md"},
      "keys/index.md"
    ]}
  ]}
]

[project.extra]
fediverse_handle = "@ajhalili2006:tilde.zone"

# socials
[[project.extra.social]]
icon = "fontawesome/brands/mastodon"
link = "https://tilde.zone/@ajhalili2006"
name = "~ajhalili2006 on tildeverse"
[[project.extra.social]]
icon = "simple/bluesky"
link = "https://bsky.app/profile/andreijiroh.dev"
name = "~ajhalili2006 on the atmosphere"
[[project.extra.social]]
icon = "fontawesome/brands/gitlab"
link = "https://gitlab.com/ajhalili2006"
name = "~ajhalili2006 on GitLab SaaS"
[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/ajhalili2006"
name = "~ajhalili2006 on GitHub"

### theme settings ###
[project.theme]
variant = "modern"
custom_dir = "overrides"
favicon = "assets/images/favicon.png"
# project features
features = [
    "announce.dismiss",
    "content.action.edit",
    "content.action.view",
    "content.code.annotate",
    "content.code.copy",
    "navigation.footer",
    "avigation.indexes",
    "navigation.sections",
    "navigation.tabs",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "search.share",
    "search.suggest",
    "toc.follow",
]
[project.theme.icon]
logo = "octicons/person-16"
repo = "material/gitlab"
[project.theme.icon.admonition]
note = "octicons/tag-16"
abstract = "octicons/checklist-16"
info = "octicons/info-16"
tip = "octicons/squirrel-16"
success = "octicons/check-16"
question = "octicons/question-16"
warning = "octicons/alert-16"
failure = "octicons/x-circle-16"
danger = "octicons/zap-16"
bug = "octicons/bug-16"
example = "octicons/beaker-16"
quote = "octicons/quote-16"
# Palette toggle for automatic mode
[[project.theme.palette]]
media = "(prefers-color-scheme)"
primary = "green"
accent = "yellow"
toggle.icon = "material/brightness-auto"
toggle.name = "Switch to light mode"
## Palette toggle for light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "green"
accent = "yellow"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"
## Palette toggle for dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "green"
accent = "yellow"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to system preference"

### markdown extensions ###
[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.abbr]
# enable support for custom emojis
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
options.custom_icons = ["overrides/.icons"]
